version: '3.8'

services:
  server:
    image: ghcr.io/nathkaden/temp-stats-server:latest
    container_name: pi-monitor-server
    ports:
      - "8001:8000"
    volumes:
      - ./server-data:/app/data
    environment:
      - API_KEY=${API_KEY:-your-secret-key}
    restart: always

  client:
    image: ghcr.io/nathkaden/temp-stats-client:latest
    container_name: pi-monitor-client
    ports:
      - "3001:3000"
    depends_on:
      - server
    environment:
      - BACKEND_API_URL=http://server:8000
    restart: always

  watchtower:
    image: containrrr/watchtower
    container_name: pi-monitor-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: always
