services:
  server:
    build: ./server
    container_name: nuc-monitor-server
    hostname: nuc-box
    ports:
      - "8001:8000"
    volumes:
      - ./server:/app
      - ./server/data:/app/data
    environment:
      - API_KEY=${API_KEY:-your-secret-key}
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    restart: always

  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: nuc-monitor-client
    ports:
      - "3001:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    environment:
      - BACKEND_API_URL=http://server:8000
    command: npm run dev
    depends_on:
      - server
    restart: always
