version: '3.8'

services:
  server:
    build: ./server
    container_name: pi-monitor-server
    ports:
      - "8001:8000"
    volumes:
      - ./server/data:/app/data
    environment:
      - API_KEY=${API_KEY:-your-secret-key}
    restart: always

  client:
    build: ./client
    container_name: pi-monitor-client
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    depends_on:
      - server
    restart: always
