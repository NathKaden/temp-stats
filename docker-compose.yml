version: '3.8'

services:
  server:
    build: ./server
    container_name: pi-monitor-server
    ports:
      - "8000:8000"
    volumes:
      - ./server/data:/app/data
    environment:
      - API_KEY=${API_KEY:-your-secret-key}
    restart: always

  client:
    build: ./client
    container_name: pi-monitor-client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - server
    restart: always
