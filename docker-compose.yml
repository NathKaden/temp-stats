services:
  server:
    image: ghcr.io/nathkaden/temp-stats-server:latest
    container_name: pi-monitor-server
    volumes:
      - ./server-data:/app/data
    environment:
      - API_KEY=${API_KEY:-your-secret-key}
    networks:
      - proxy
      - default
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.temp-stats-server.rule=Host(`api.stats.beskarfox.com`)"
      - "traefik.http.routers.temp-stats-server.entrypoints=websecure"
      - "traefik.http.routers.temp-stats-server.tls=true"
      - "traefik.http.routers.temp-stats-server.tls.certresolver=myresolver"
      - "traefik.http.services.temp-stats-server.loadbalancer.server.port=8000"

  client:
    image: ghcr.io/nathkaden/temp-stats-client:latest
    container_name: pi-monitor-client
    depends_on:
      - server
    environment:
      - BACKEND_API_URL=https://api.stats.beskarfox.com
    networks:
      - proxy
      - default
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.temp-stats-client.rule=Host(`stats.beskarfox.com`)"
      - "traefik.http.routers.temp-stats-client.entrypoints=websecure"
      - "traefik.http.routers.temp-stats-client.tls=true"
      - "traefik.http.routers.temp-stats-client.tls.certresolver=myresolver"
      - "traefik.http.services.temp-stats-client.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
